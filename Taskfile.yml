version: "3"

tasks:
  editor:
    desc: Start asset editor (backend + frontend)
    cmds:
      - bash asset_generation/web/start.sh

  editor:debug-spots:
    desc: Start asset editor with BLOBERT_DEBUG_SPOTS=1 (stdout [blobert:spots] compositing logs)
    env:
      BLOBERT_DEBUG_SPOTS: "1"
    cmds:
      - bash asset_generation/web/start.sh

  web:start:
    desc: Alias for editor startup
    cmds:
      - task editor

  tests:all:
    desc: Run canonical full test suite
    cmds:
      - timeout 300 ci/scripts/run_tests.sh

  tests:godot:
    desc: Run Godot headless tests only
    cmds:
      - timeout 300 godot --headless -s tests/run_tests.gd

  tests:import:
    desc: Rebuild Godot import/class cache
    cmds:
      - timeout 120 godot --headless --import

  python:sync:
    desc: Sync asset_generation Python venv (uv; includes Pillow + dev extras for pipeline/backends)
    dir: asset_generation/python
    cmds:
      - uv sync --extra dev

  tests:python:
    desc: Run asset_generation Python tests (pytest + diff-cover; DIFF_COVER_FAIL_UNDER default 85 in py-tests.sh)
    cmds:
      - bash .lefthook/scripts/py-tests.sh

  tests:web:
    desc: Run asset editor frontend unit tests (Vitest)
    cmds:
      - npm test
    dir: asset_generation/web/frontend

  hooks:blog:
    desc: Run pre-push blog generation hook
    cmds:
      - BLOG_HOOK_PHASE=pre-push .lefthook/scripts/blog-post-on-push.sh

  hooks:log-commit:
    desc: Queue commit metadata for pre-push blog generation
    cmds:
      - bash .lefthook/scripts/log-commit.sh

  hooks:commit-msg:
    desc: Conventional commit advisory check (non-blocking)
    cmds:
      - bash .lefthook/scripts/commit-msg-conventional.sh {{.CLI_ARGS}}

  hooks:godot:
    desc: Run pre-push Godot hook script
    cmds:
      - bash .lefthook/scripts/godot-tests.sh

  hooks:python:
    desc: Run pre-push Python hook (honors DIFF_COVER_FAIL_UNDER / DIFF_COVER_COMPARE_BRANCH)
    cmds:
      - bash .lefthook/scripts/py-tests.sh

  hooks:py-parse:
    desc: Python parse check for staged files (project .venv or uv run)
    cmds:
      - bash ci/scripts/asset_python.sh -m py_compile {{.CLI_ARGS}}

  hooks:py-review:
    desc: Ruff checks for staged Python (asset_generation/python/pyproject.toml)
    cmds:
      - bash .lefthook/scripts/py-review.sh {{.CLI_ARGS}}

  hooks:py-pylint:
    desc: Pylint too-many-statements for staged Python (asset_generation/python/pyproject.toml)
    cmds:
      - bash .lefthook/scripts/py-pylint.sh {{.CLI_ARGS}}

  hooks:py-organization:
    desc: Python organization guardrails for staged files (project .venv or uv run)
    cmds:
      - bash ci/scripts/asset_python.sh .lefthook/scripts/py_organization_check.py {{.CLI_ARGS}}

  hooks:gd-review:
    desc: Godot script reviewer checks for staged files (project .venv or uv run)
    cmds:
      - bash ci/scripts/asset_python.sh .lefthook/scripts/gd_review_check.py {{.CLI_ARGS}}

  hooks:gd-organization:
    desc: Godot script organization checks for staged files (project .venv or uv run)
    cmds:
      - bash ci/scripts/asset_python.sh .lefthook/scripts/gd_organization_check.py {{.CLI_ARGS}}

  hooks:static-analysis:
    desc: Run static analysis gate (shadow mode, non-blocking) — validates Python, TypeScript, Godot, duplication
    cmds:
      - python ci/scripts/gate_runner.py static_analysis_check --mode shadow --upstream-agent "Implementation Generalist" --downstream-agent "Spec Agent" --ticket-id M902-02

  hooks:governance-check:
    desc: Run governance check gate (shadow mode, non-blocking) — validates architecture, exception safety, reflection, async, observability, integrity
    cmds:
      - python ci/scripts/gate_runner.py governance_check --mode shadow --upstream-agent "Implementation Generalist" --downstream-agent "Spec Agent" --ticket-id M902-03

  claude:sync-from-agent-context:
    desc: Install .claude/skills and .claude/agents from agent_context (see scripts/sync_claude_agent_context.sh)
    cmds:
      - bash scripts/sync_claude_agent_context.sh install {{.CLI_ARGS}}

  claude:export-to-agent-context:
    desc: Copy .claude/skills and .claude/agents back to agent_context for backup or iCloud sync
    cmds:
      - bash scripts/sync_claude_agent_context.sh export {{.CLI_ARGS}}
