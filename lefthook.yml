# Git hooks for blobert (Godot 4 game + Blender asset pipeline).
# Install:  lefthook install
# Skip:     LEFTHOOK=0 git commit / git push
# Agent/CI: bash hooks source .lefthook/scripts/hook-noninteractive.sh (no prompts; npx --yes; /bin/cp -f).
#          Do not use interactive `cp` or bare `npx` without --yes in hook paths.
# Blog script is currently disabled from git hooks.
# Manual run (still available): BLOG_HOOK_PHASE=pre-push .lefthook/scripts/blog-post-on-push.sh
#
# post-commit — session tracking only (no claude/cursor-agent, no blog_post_v1):
#   - log-commit: appends commit hash + subject to .blog-session.log
#
# commit-msg — advisory conventional commit guidance:
#   - commit-msg-conventional: non-blocking format hint for type(scope): message
#
# task integration:
#   - Hook commands delegate to Taskfile targets so local/manual and hook flows share one entry point.
#
# pre-commit — fast checks on staged files only:
#   - api-contract-check: when asset_generation/web/backend/**/*.py staged — sync-api-types, tsc, contract pytest (runbook: project_board/specs/902_27_api_contract_precommit_spec.md Appendix C)
#   - py-parse: syntax-check staged Python under asset_generation/python/, ci/scripts/, tests/ci/
#   - py-review: Ruff (E9/F/I) on staged asset_generation/**/*.py, ci/scripts/**/*.py, tests/ci/**/*.py
#   - py-pylint: Pylint too-many-statements (max 50) on same Python paths as py-review
#   - py-organization: package/init/DRY; getattr/setattr forbidden on newly staged lines outside tests/
#   - gd-review: hygiene + unexplained literals on added .gd lines (excludes tests/, reference_projects/)
#
# pre-push — full test suites (parallel: true — godot-tests and py-tests run concurrently when both globs match):
#   - godot-tests: full Godot test suite (any .gd/.tscn/.tres change)
#   - py-tests:    Ruff (asset_generation) + mypy manifest + pytest/cov + diff-cover
#   - py-tests-ci: repo-root tests/ci when ci/scripts or tests/ci change (see py-tests-ci.sh)
#   - Opt-out: LEFTHOOK=0 skips all hooks; LEFTHOOK_EXCLUDE=<command> skips one command; set parallel: false in this file to force sequential pre-push
#
# Requires:
#   - Godot.app at /Applications/ (macOS) — see bin/godot wrapper
#   - asset_generation/python/.venv or uv on PATH (hooks use ci/scripts/asset_python.sh + py-tests.sh)
#   - For py-tests: uv sync --extra dev in asset_generation/python/ (uses .venv)

post-commit:
  commands:
    log-commit:
      name: Queue commit metadata (blog hook disabled)
      run: task hooks:log-commit

commit-msg:
  commands:
    commit-msg-conventional:
      name: Conventional commit advisory (non-blocking)
      run: task hooks:commit-msg -- {1}

pre-commit:
  parallel: true
  commands:
    py-parse:
      name: Python parse check (asset_generation, ci/scripts, tests/ci)
      glob: "{asset_generation/python/**/*.py,ci/scripts/**/*.py,tests/ci/**/*.py}"
      run: task hooks:py-parse -- {staged_files}
    py-review:
      name: Python (Ruff, pyproject.toml)
      glob: "{asset_generation/**/*.py,ci/scripts/**/*.py,tests/ci/**/*.py}"
      run: task hooks:py-review -- {staged_files}
    py-pylint:
      name: Python (Pylint too-many-statements)
      glob: "{asset_generation/python/**/*.py,ci/scripts/**/*.py,tests/ci/**/*.py}"
      run: task hooks:py-pylint -- {staged_files}
    py-organization:
      name: Python organization guardrails
      glob: "asset_generation/**/*.py"
      run: task hooks:py-organization -- {staged_files}
    py-defensive-normalization:
      name: Python defensive normalization check (code smell)
      glob: "asset_generation/python/**/*.py"
      run: bash .lefthook/scripts/detect-defensive-normalization.sh {staged_files}
    gd-review:
      name: Godot script reviewer hygiene
      glob: "**/*.gd"
      run: task hooks:gd-review -- {staged_files}
    gd-organization:
      name: Godot script organization guardrails
      glob: "**/*.gd"
      run: task hooks:gd-organization -- {staged_files}
    api-contract-check:
      name: API contract (OpenAPI sync, tsc, contract tests)
      glob: "asset_generation/web/backend/**/*.py"
      run: bash .lefthook/scripts/api-contract-check.sh
      stage: commit

pre-push:
  parallel: true
  commands:
    godot-tests:
      name: Godot test suite
      glob: "**/*.{gd,tscn,tres,gdshader}"
      run: task hooks:godot
    py-tests:
      name: Python tests (asset_generation)
      glob: "asset_generation/python/**/*.py"
      run: task hooks:python
    py-tests-ci:
      name: Python tests (repo-root tests/ci)
      glob: "{ci/scripts/**/*.py,tests/ci/**/*.py}"
      run: bash .lefthook/scripts/py-tests-ci.sh
